version: "3.9"

services:
  web:
    build: .
    container_name: simple_lms_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: simple_lms_db
    restart: always
    env_file:
      - .env.example
    ports:
      - "5432:5432"
